<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aris AI Desktop Assistant</title>
    
    <!-- Live2D & PIXI Libraries -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            color: #ffffff;
        }

        /* ── 메인 컨테이너 ── */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
        }

        /* ── 아리스 캐릭터 (우측 하단) ── */
        .aris-container {
            position: absolute;
            bottom: 20px;
            right: 40px;
            width: 450px;
            height: 650px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1;
        }

        #live2d-canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(0, 163, 255, 0.6));
        }

        /* ── 말풍선 ── */
        .chat-bubble-container {
            position: absolute;
            bottom: 160px;
            right: 420px;
            width: 420px;
            max-height: 280px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .ui-tag {
            background: #00A3FF;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
            margin-bottom: -1px;
            border-left: 3px solid #ffffff;
        }

        .chat-bubble {
            width: 100%;
            background: rgba(5, 18, 40, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1.5px solid rgba(0, 163, 255, 0.55);
            border-top: none;
            border-radius: 0 0 16px 16px;
            padding: 16px 18px;
            box-shadow:
                0 8px 32px rgba(0, 163, 255, 0.15),
                inset 0 0 20px rgba(0, 163, 255, 0.05);
            color: #e8f4ff;
            font-size: 14.5px;
            line-height: 1.65;
            overflow-y: auto;
        }

        /* 스피커 이름 */
        .speaker-name {
            font-size: 11px;
            font-weight: bold;
            color: #00A3FF;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        #chatText {
            display: block;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ── 로딩 애니메이션 ── */
        .loading-dots {
            display: none;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
        }

        .loading-dots span {
            font-size: 12px;
            color: rgba(0, 163, 255, 0.7);
            letter-spacing: 1px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: #00A3FF;
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(2) { animation-delay: -0.32s; }
        .dot:nth-child(3) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── 입력창 ── */
        .input-container {
            width: 560px;
            display: flex;
            align-items: center;
            background: rgba(5, 18, 40, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(0, 163, 255, 0.6);
            border-radius: 30px;
            padding: 5px 8px 5px 20px;
            box-shadow:
                0 0 18px rgba(0, 163, 255, 0.2),
                inset 0 0 8px rgba(0, 163, 255, 0.08);
            z-index: 3;
            transition: all 0.3s ease;
        }

        .input-container:focus-within {
            border-color: rgba(0, 163, 255, 0.9);
            box-shadow:
                0 0 28px rgba(0, 163, 255, 0.5),
                inset 0 0 14px rgba(0, 163, 255, 0.15);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e8f4ff;
            font-size: 14px;
            padding: 10px 0;
            letter-spacing: 0.3px;
        }

        .chat-input::placeholder {
            color: rgba(0, 163, 255, 0.4);
            font-size: 13px;
        }

        /* 우측 버튼 그룹 */
        .btn-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .send-btn {
            background: linear-gradient(135deg, #00A3FF, #0077cc);
            border: none;
            color: white;
            padding: 9px 22px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 163, 255, 0.4);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #33b8ff, #0099ee);
            box-shadow: 0 0 18px rgba(0, 163, 255, 0.7);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: transparent;
            border: 1px solid rgba(0, 163, 255, 0.4);
            color: rgba(0, 163, 255, 0.7);
            padding: 9px 14px;
            font-size: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:hover {
            border-color: rgba(0, 163, 255, 0.8);
            color: #00A3FF;
            background: rgba(0, 163, 255, 0.08);
        }

        /* ── 서버 상태 표시기 ── */
        .status-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(5, 18, 40, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 163, 255, 0.3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 11px;
            color: rgba(200, 230, 255, 0.8);
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #888;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.online  { background: #00e676; box-shadow: 0 0 6px #00e676; }
        .status-dot.offline { background: #ff5252; box-shadow: 0 0 6px #ff5252; }

        /* 스크롤바 */
        .chat-bubble::-webkit-scrollbar { width: 3px; }
        .chat-bubble::-webkit-scrollbar-thumb {
            background: rgba(0, 163, 255, 0.4);
            border-radius: 2px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 서버 상태 표시기 -->
    <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">서버 연결 중...</span>
    </div>

    <!-- 말풍선 -->
    <div class="chat-bubble-container">
        <div class="ui-tag">MILLENNIUM AI SYSTEM · ARIS v2.0</div>
        <div class="chat-bubble" id="chatBubble">
            <div class="speaker-name">ARIS</div>
            <span id="chatText">선생님, 아리스는 준비 완료입니다. 무슨 명령이든 내려주십시오.</span>
            <div class="loading-dots" id="loadingDots">
                <span>연산 중</span>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- 입력창 -->
    <div class="input-container">
        <input
            type="text"
            id="chatInput"
            class="chat-input"
            placeholder="아리스에게 명령 또는 질문을 입력하세요..."
            autocomplete="off"
        >
        <div class="btn-group">
            <button class="reset-btn" id="resetBtn" title="대화 초기화">↺</button>
            <button class="send-btn" id="sendBtn">전송</button>
        </div>
    </div>

    <!-- 아리스 캐릭터 (Live2D Canvas) -->
    <div class="aris-container">
        <canvas id="live2d-canvas"></canvas>
    </div>

</div>

<script>
    // ── Live2D 및 PIXI 설정 ──────────────────────────────────────────────
    const canvas = document.getElementById('live2d-canvas');
    const app = new PIXI.Application({
        view: canvas,
        transparent: true,
        autoStart: true,
        resizeTo: canvas
    });

    let live2dModel;

    // 💡 중요: 다운로드하신 폴더 이름과 model3.json 파일명에 맞춰서 여기를 수정해 주세요!
    // 예시: 폴더 이름이 'aris'고 파일이 'aris.model3.json'이라면 -> 'aris/aris.model3.json'
    const modelPath = 'aris_home/project.json'; 

    async function initLive2D() {
        try {
            // pixi-live2d-display 로드
            live2dModel = await PIXI.live2d.Live2DModel.from(modelPath);
            app.stage.addChild(live2dModel);

            // 캔버스 크기에 맞춰 모델 스케일 및 위치 자동 조정
            const scale = Math.min(canvas.width / live2dModel.width, canvas.height / live2dModel.height) * 0.9;
            live2dModel.scale.set(scale);
            live2dModel.x = (canvas.width - live2dModel.width * scale) / 2;
            live2dModel.y = canvas.height - live2dModel.height * scale;

            // 1. 시선 추적 (Eye-tracking) 적용
            window.addEventListener('mousemove', (event) => {
                // 화면 중앙을 0, 끝을 1, -1로 정규화
                const x = (event.clientX / window.innerWidth) * 2 - 1;
                const y = (event.clientY / window.innerHeight) * 2 - 1;
                // Live2D 모델의 focus를 업데이트하여 마우스를 쳐다보게 함
                live2dModel.focus(x, y);
            });

            console.log("Live2D 모델 로드 성공!");
        } catch (error) {
            console.error("Live2D 로드 실패: 폴더 경로와 파일명을 확인해주세요.", error);
            statusText.textContent = 'Live2D 로드 실패';
        }
    }
    
    initLive2D();

    // ── 설정 ─────────────────────────────────────────────────────────────
    // Lively Wallpaper에서 웹페이지를 호스팅 URL로 불러올 때,
    // 로컬 Flask 서버는 여전히 127.0.0.1:5000 에서 실행됩니다.
    const SERVER_URL = 'https://backhand-jubilance-daisy.ngrok-free.dev;
    const CHAT_URL   = `${SERVER_URL}/chat`;
    const HEALTH_URL = `${SERVER_URL}/health`;
    const RESET_URL  = `${SERVER_URL}/reset`;
    // ──────────────────────────────────────────────────────────────────────

    const chatInput   = document.getElementById('chatInput');
    const sendBtn     = document.getElementById('sendBtn');
    const resetBtn    = document.getElementById('resetBtn');
    const chatText    = document.getElementById('chatText');
    const loadingDots = document.getElementById('loadingDots');
    const statusDot   = document.getElementById('statusDot');
    const statusText  = document.getElementById('statusText');

    let isProcessing = false;
    let typeTimer = null;

    // ── 서버 상태 확인 ────────────────────────────────────────────────────
    async function checkServerHealth() {
        try {
            const res = await fetch(HEALTH_URL, { method: 'GET', signal: AbortSignal.timeout(3000) });
            if (res.ok) {
                statusDot.className = 'status-dot online';
                statusText.textContent = 'ARIS ONLINE';
            } else {
                throw new Error();
            }
        } catch {
            statusDot.className = 'status-dot offline';
            statusText.textContent = '서버 오프라인';
        }
    }

    // 최초 + 30초마다 상태 확인
    checkServerHealth();
    setInterval(checkServerHealth, 30000);

    // ── 타이핑 효과 ───────────────────────────────────────────────────────
    function typeEffect(text, speed = 35) {
        clearTimeout(typeTimer);
        chatText.textContent = '';
        let i = 0;

        function step() {
            if (i < text.length) {
                chatText.textContent += text[i++];
                typeTimer = setTimeout(step, speed);
            }
        }
        step();
    }

    // ── 감정 표현 (Live2D 모션/표정 제어) ──────────────────────────────────
    function changeArisEmotion(emotion) {
        if (!live2dModel) return;

        // 다운로드하신 모델에 내장된 표정(Expression)이나 모션(Motion) 파일 이름에 맞춰 매핑해야 합니다.
        // 아래는 구조를 보여주는 예시입니다.
        try {
            if (emotion === "기쁨") {
                // live2dModel.expression("Smile");
                // live2dModel.motion("TapBody", 0, 3); // 3은 우선순위(강제재생)
            } else if (emotion === "놀람") {
                // live2dModel.expression("Surprise");
            } else if (emotion === "슬픔") {
                // live2dModel.expression("Sad");
            } else {
                // live2dModel.expression("Neutral");
            }
        } catch(e) {
            console.warn("표정 변경 실패:", e);
        }
    }

    // ── 메시지 전송 ───────────────────────────────────────────────────────
    async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message || isProcessing) return;

        isProcessing = true;
        chatInput.value = '';
        sendBtn.disabled = true;

        // 로딩 표시
        chatText.textContent = '';
        loadingDots.style.display = 'flex';

        try {
            const res = await fetch(CHAT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message }),
                signal: AbortSignal.timeout(30000),
            });

            const data = await res.json();
            loadingDots.style.display = 'none';

            let replyText = data.reply || '응답을 받지 못했습니다, 선생님.';
            let currentEmotion = '기본'; // 기본값

            // 정규식을 사용해 [감정] 태그 추출
            const emotionMatch = replyText.match(/^\[(.*?)\]\s*/);
            if (emotionMatch) {
                currentEmotion = emotionMatch[1]; // 예: '기쁨', '슬픔'
                replyText = replyText.replace(/^\[(.*?)\]\s*/, ''); // 화면 텍스트에서는 태그 삭제
            }

            // 텍스트 출력 및 감정 표현
            typeEffect(replyText);
            changeArisEmotion(currentEmotion);

            // 서버 정상 응답 시 상태 업데이트
            statusDot.className = 'status-dot online';
            statusText.textContent = 'ARIS ONLINE';

        } catch (err) {
            console.error(err);
            loadingDots.style.display = 'none';
            typeEffect('선생님, 서버에 연결할 수 없습니다. app.py가 실행 중인지 확인해 주십시오.');
            statusDot.className = 'status-dot offline';
            statusText.textContent = '서버 오프라인';
        } finally {
            isProcessing = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    // ── 대화 초기화 ───────────────────────────────────────────────────────
    async function resetChat() {
        try {
            const res = await fetch(RESET_URL, { method: 'POST' });
            const data = await res.json();
            typeEffect(data.reply);
        } catch {
            typeEffect('대화 기록을 초기화했습니다, 선생님.');
        }
    }

    // ── 이벤트 리스너 ────────────────────────────────────────────────────
    sendBtn.addEventListener('click', sendMessage);
    resetBtn.addEventListener('click', resetChat);
    chatInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
```
